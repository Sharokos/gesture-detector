<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video frame & time helper</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<h1>Video frame & time helper</h1>


<input type="file" id="fileInput" accept="video/*" />


<div class="main-container">
  <div class="video-section">
    <video id="video" controls></video>

    <div class="controls">
      <div class="card">
        <label>Detected FPS</label>
        <div id="fpsReadout">–</div>
      </div>

      <div class="card">
        <label>Step mode</label>
        <select id="stepMode">
          <option value="frame">Frame</option>
          <option value="time">Time (seconds)</option>
        </select>

        <label>Step size</label>
        <input type="number" id="stepSize" value="1" step="0.001" />

        <div class="step-buttons">
          <button id="stepBack">◀ Step</button>
          <button id="stepForward">Step ▶</button>
        </div>
      </div>

      <div class="card readout">
        <div>Time: <span id="timeReadout">0.000</span> s</div>
        <div>Frame: <span id="frameReadout">0</span></div>
      </div>
    </div>
  </div>

  <div class="card timestamps-card">
    <h2>Timestamp markers</h2>
    <div class="timestamp-controls">
      <button id="saveTimestampBtn">Save (S)</button>
      <button id="clearTimestampsBtn">Clear</button>
      <button id="exportJsonBtn">Export</button>
    </div>

    <div id="timestampsList" class="timestamps-list">
      <p class="no-timestamps">No timestamps saved yet. Press S or click "Save Timestamp" to mark cuts.</p>
    </div>

    <hr style="margin: 20px 0; border: none; border-top: 1px solid #333;">

    <h2>Gesture indicator</h2>
    <div class="gesture-section">
      <label for="gestureJsonInput">Load gesture JSON:</label>
      <input type="file" id="gestureJsonInput" accept=".json" />
      
      <div id="gestureIndicator" class="gesture-indicator hidden">
        <div class="indicator-value" id="indicatorValue">–</div>
        <div class="indicator-info" id="indicatorInfo"></div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
